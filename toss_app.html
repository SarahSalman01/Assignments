<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coin Toss</title>

    <style>
        body {
            text-align: center;
            font-family: sans-serif;
            padding-top: 50px;
        }

        .result {
            font-size: 3rem;
            margin: 20px;
            color: #333;
        }

        button {
            padding: 10px 20px;
            font-size: 1.2rem;
            cursor: pointer;
        }

        #coin {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 4px solid rgb(72, 72, 0);
            transition: transform 0.5s;
        }

        .flip {
            transform: rotateY(360deg);
        }
    </style>
</head>

<body>

    <img id="coin" src="uploads/coinHead.png" alt="coin">

    <div class="result" id="tossResult">Press to Flip</div>

    <button onclick="tossCoin()">Toss Coin</button>

    <script>
        function tossCoin() {
            const resultElement = document.getElementById('tossResult');
            const coin = document.getElementById('coin');

            const isHeads = Math.random() < 0.5;

            coin.classList.add("flip");

            setTimeout(() => {
                if (isHeads) {
                    resultElement.innerText = "HEADS";
                    coin.src = "uploads/coinHead.png";
                } else {
                    resultElement.innerText = "TAILS";
                    coin.src = "uploads/coinTail.png";
                }

                coin.classList.remove("flip");
            }, 500);
        }
    </script>

</body>
</html>
